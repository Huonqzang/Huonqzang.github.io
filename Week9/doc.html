<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Ex03</title>
    <script>
        var txta = prompt("Enter any integer:");

        if (txta === null || txta === "" || isNaN(txta)) {
            document.write("<font color='red'>You must enter a number</font>");
        } 
        else {
            var num = parseInt(txta);

            if (num % 2 === 0) {
                document.write("<font color='green'><b>" + num + " is an even number</b></font>");
            } else {
                document.write("<font color='blue'><i>" + num + " is an odd number</i></font>");
            }
        }
    </script>
</head>
<body>
</body>
</html>
